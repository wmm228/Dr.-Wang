<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="./static/img/favicon-mu.svg?v=20260514">
    <title>相册 - Wmumu Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #2b2b2b;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }
        .wood-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/wood-pattern.png'), #3e2723;
            opacity: 0.8;
            z-index: -1;
        }
        
        .gallery-container {
            padding: 40px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
        }
        
        .polaroid {
            background: white;
            padding: 10px 10px 30px 10px;
            box-shadow: 5px 10px 15px rgba(0,0,0,0.4);
            transform: rotate(-2deg);
            transition: transform 0.3s, z-index 0s;
            position: relative;
            cursor: pointer;
            width: 200px;
        }
        
        .polaroid:nth-child(even) { transform: rotate(3deg); }
        .polaroid:nth-child(3n) { transform: rotate(-4deg); }
        .polaroid:nth-child(5n) { transform: rotate(2deg); }
        
        .polaroid:hover {
            transform: scale(1.1) rotate(0deg);
            z-index: 10;
            box-shadow: 10px 20px 30px rgba(0,0,0,0.5);
        }
        
        .photo {
            width: 100%;
            height: 200px;
            object-fit: cover;
            filter: sepia(0.2) contrast(1.1);
            background: #eee;
        }
        
        .caption {
            text-align: center;
            font-family: 'Dancing Script', cursive;
            font-size: 1.2rem;
            color: #444;
            margin-top: 10px;
        }
        
        .clip {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 30px;
            background: #888;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 5;
        }

        .back-sticker {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #ffeb3b;
            color: #333;
            padding: 10px 20px;
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            text-decoration: none;
            transform: rotate(-5deg);
            box-shadow: 2px 3px 5px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .back-sticker:hover { transform: scale(1.1) rotate(0deg); }
    </style>
</head>
<body>
    <div class="wood-bg"></div>
    
    <div class="gallery-container" id="gallery-container">
        <!-- JS will populate -->
    </div>

    <a href="./about.html" class="back-sticker">Back to Home</a>

    <script>
        const container = document.getElementById('gallery-container');
        const captions = ["Beautiful Day", "Memories", "Travel", "Friends", "Coding", "Coffee", "Sunset", "Dream", "Work", "Life"];
        
        for (let i = 1; i <= 15; i++) {
            const div = document.createElement('div');
            div.className = 'polaroid';
            
            // Random caption
            const cap = captions[Math.floor(Math.random() * captions.length)];
            
            div.innerHTML = `
                <div class="clip"></div>
                <img src="./static/img/gallery/${i}.jpg" class="photo" onerror="this.src='./static/img/new_home/my_bg.jpg'">
                <div class="caption">#${i} ${cap}</div>
            `;
            container.appendChild(div);
        }
    </script>
</body>
</html>
