    <script>
        // Global Error Handler for Debugging
        window.onerror = function(msg, url, line, col, error) {
            const errDiv = document.createElement('div');
            errDiv.style.position = 'fixed';
            errDiv.style.top = '0';
            errDiv.style.left = '0';
            errDiv.style.width = '100%';
            errDiv.style.background = 'rgba(255, 0, 0, 0.9)';
            errDiv.style.color = 'white';
            errDiv.style.padding = '10px';
            errDiv.style.zIndex = '10000';
            errDiv.style.fontFamily = 'monospace';
            errDiv.style.whiteSpace = 'pre-wrap';
            errDiv.innerText = `JS Error: ${msg}\nFile: ${url}:${line}:${col}\n${error ? error.stack : ''}`;
            document.body.appendChild(errDiv);
            return false;
        };
        window.addEventListener('unhandledrejection', function(event) {
            const errDiv = document.createElement('div');
            errDiv.style.position = 'fixed';
            errDiv.style.bottom = '0';
            errDiv.style.left = '0';
            errDiv.style.width = '100%';
            errDiv.style.background = 'rgba(255, 100, 0, 0.9)';
            errDiv.style.color = 'white';
            errDiv.style.padding = '10px';
            errDiv.style.zIndex = '10000';
            errDiv.style.fontFamily = 'monospace';
            errDiv.innerText = `Promise Error: ${event.reason}`;
            document.body.appendChild(errDiv);
        });
    </script>
